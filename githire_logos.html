
<style>
  body { margin: 0; background: transparent; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 16px 0; }
  .card { background: #0f172a; border-radius: 16px; padding: 32px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .card.light { background: #f1f5f9; }
  .card.mid { background: #1e293b; }
  .label { font-family: system-ui, sans-serif; font-size: 11px; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; }
  .label.dk { color: #94a3b8; }
  .dl-btn { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 500; background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
  .dl-btn:hover { background: #2563eb; }
</style>

<div class="grid">

  <!-- Logo 1: Icon + wordmark, dark bg -->
  <div class="card">
    <svg id="logo1" width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Hex icon -->
      <polygon points="28,10 46,10 54,24 46,38 28,38 20,24" fill="#3b82f6"/>
      <!-- G letter inside hex -->
      <text x="37" y="29" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#ffffff">G</text>
      <!-- Branch dot top -->
      <circle cx="42" cy="8" r="3" fill="#60a5fa"/>
      <!-- Branch line from hex -->
      <line x1="42" y1="10" x2="42" y2="8" stroke="#60a5fa" stroke-width="1.5"/>
      <!-- WordMark -->
      <text x="64" y="20" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff" dominant-baseline="central">Git</text>
      <text x="101" y="20" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#3b82f6" dominant-baseline="central">Hire</text>
      <text x="64" y="46" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b" dominant-baseline="central" letter-spacing="0.12em">AI JOB MATCHING</text>
    </svg>
    <span class="label dk">Dark — full</span>
    <button class="dl-btn" onclick="downloadSVG('logo1','githire-dark-full')">Download SVG</button>
  </div>

  <!-- Logo 2: Icon only, dark bg -->
  <div class="card">
    <svg id="logo2" width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer rounded square -->
      <rect x="6" y="6" width="68" height="68" rx="20" fill="#1e40af"/>
      <!-- Inner hex shape -->
      <polygon points="40,16 58,26 58,54 40,64 22,54 22,26" fill="#3b82f6"/>
      <!-- G letter -->
      <text x="40" y="41" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#ffffff">G</text>
      <!-- Branch nodes -->
      <circle cx="40" cy="12" r="4" fill="#93c5fd"/>
      <circle cx="62" cy="24" r="3" fill="#60a5fa"/>
      <circle cx="62" cy="56" r="3" fill="#60a5fa"/>
      <!-- Branch lines -->
      <line x1="40" y1="16" x2="40" y2="16" stroke="#93c5fd" stroke-width="1.5"/>
      <line x1="58" y1="26" x2="62" y2="24" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="58" y1="54" x2="62" y2="56" stroke="#60a5fa" stroke-width="1.5"/>
    </svg>
    <span class="label dk">Icon only</span>
    <button class="dl-btn" onclick="downloadSVG('logo2','githire-icon')">Download SVG</button>
  </div>

  <!-- Logo 3: Wordmark only, dark bg -->
  <div class="card">
    <svg id="logo3" width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Bracket left -->
      <path d="M12 12 L4 30 L12 48" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Wordmark -->
      <text x="22" y="31" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" dominant-baseline="central">Git</text>
      <text x="72" y="31" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#3b82f6" dominant-baseline="central">Hire</text>
      <!-- Bracket right -->
      <path d="M146 12 L154 30 L146 48" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="label dk">Wordmark</span>
    <button class="dl-btn" onclick="downloadSVG('logo3','githire-wordmark')">Download SVG</button>
  </div>

  <!-- Logo 4: Light background version -->

      <!-- Hex icon -->

      <text x="37" y="24" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#ffffff">G</text>
      <circle cx="42" cy="7" r="3" fill="#3b82f6"/>
      <line x1="42" y1="10" x2="42" y2="7" stroke="#3b82f6" stroke-width="1.5"/>
      <!-- Wordmark dark -->
      <text x="64" y="20" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#0f172a" dominant-baseline="central">Git</text>
      <text x="101" y="20" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8" dominant-baseline="central">Hire</text>
      <text x="64" y="46" font-family="system-ui,sans-serif" font-size="9.5" fill="#94a3b8" dominant-baseline="central" letter-spacing="0.12em">AI JOB MATCHING</text>
    </svg>
    <span class="label">Light — full</span>
    <button class="dl-btn" onclick="downloadSVG('logo4','githire-light-full')">Download SVG</button>
  </div>

  <!-- Logo 5: Teal accent variant -->
  <div class="card mid">
    <svg id="logo5" width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Circuit-style icon -->
      <rect x="14" y="10" width="44" height="38" rx="10" fill="#0f766e"/>
      <!-- Git branch paths inside -->
      <circle cx="28" cy="22" r="4" fill="#5eead4"/>
      <circle cx="44" cy="22" r="4" fill="#5eead4"/>
      <circle cx="36" cy="36" r="4" fill="#2dd4bf"/>
      <line x1="28" y1="22" x2="44" y2="22" stroke="#99f6e4" stroke-width="1.5"/>
      <line x1="28" y1="22" x2="36" y2="36" stroke="#99f6e4" stroke-width="1.5"/>
      <line x1="44" y1="22" x2="36" y2="36" stroke="#99f6e4" stroke-width="1.5"/>
      <!-- Wordmark -->
      <text x="68" y="20" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff" dominant-baseline="central">Git</text>
      <text x="105" y="20" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#2dd4bf" dominant-baseline="central">Hire</text>
      <text x="68" y="46" font-family="system-ui,sans-serif" font-size="9.5" fill="#64748b" dominant-baseline="central" letter-spacing="0.12em">AI JOB MATCHING</text>
    </svg>
    <span class="label dk">Teal variant</span>
    <button class="dl-btn" onclick="downloadSVG('logo5','githire-teal')">Download SVG</button>
  </div>

  <!-- Logo 6: Minimal monochrome -->
  <div class="card">
    <svg id="logo6" width="180" height="60" viewBox="0 0 180 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Minimal branch icon -->
      <circle cx="16" cy="16" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
      <circle cx="16" cy="44" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
      <circle cx="34" cy="30" r="6" fill="#3b82f6" stroke="#3b82f6" stroke-width="2"/>
      <line x1="16" y1="22" x2="16" y2="38" stroke="#ffffff" stroke-width="2"/>
      <line x1="20" y1="18" x2="30" y2="26" stroke="#ffffff" stroke-width="2"/>
      <!-- Wordmark -->
      <text x="50" y="22" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#ffffff" dominant-baseline="central">GitHire</text>
      <text x="50" y="44" font-family="system-ui,sans-serif" font-size="10" fill="#3b82f6" dominant-baseline="central" letter-spacing="0.1em">FROM CODE TO CAREER</text>
    </svg>
    <span class="label dk">Minimal dark</span>
    <button class="dl-btn" onclick="downloadSVG('logo6','githire-minimal')">Download SVG</button>
  </div>

</div>

<script>
function downloadSVG(id, filename) {
  const svg = document.getElementById(id);
  const clone = svg.cloneNode(true);
  const ns = 'http://www.w3.org/2000/svg';
  clone.setAttribute('xmlns', ns);
  const str = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([str], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename + '.svg';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
